{% extends "base.html" %}
{% block content %}
<div class="d-flex align-items-center justify-content-between mb-4">
  <h3 class="mb-0">Shop Inventory</h3>
  <a class="btn btn-primary" href="{{ url_for('verkauf') }}">
    <i class="bi bi-credit-card"></i> New Sale
  </a>
</div>

<div class="card">
  <div class="card-body p-0">
    <table class="table table-hover align-middle mb-0">
      <thead>
        <tr>
          <th>Product Name</th>
          <th class="text-end">In Shop</th>
          <th class="text-end">Unit Price</th>
          <th class="text-end">Total Value</th>
        </tr>
      </thead>
      <tbody>
        {% for p in products %}
        <tr>
          <td>
            <strong>{{ p.name }}</strong><br>
            <small class="text-muted">{{ p.sku }}</small>
          </td>
          <td class="text-end">
            <span class="badge bg-primary">{{ p.shop_qty }}</span>
          </td>
          <td class="text-end">€ {{ "%.2f"|format(p.price) }}</td>
          <td class="text-end fw-bold">€ {{ "%.2f"|format(p.shop_qty * p.price) }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

{% endblock %}
